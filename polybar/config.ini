;==========================================================
;
;   Minimal Polybar config
;   - Green emphasis
;   - Plain centered clock capsule
;   - Workspace capsules with tighter spacing
;   - Consistent right-side spacing
;   - JetBrains Mono + icon fallback
;
;==========================================================

[colors]
background = #0E2229
background-alt = #19352A
foreground = #F6E6EA
primary = #4BC85A
primary-dark = #2D9E42
secondary = #4DD6F2
alert = #D95A5A
disabled = #738791

[bar/example]
width = 100%
height = 30pt
radius = 20

border-color = #00000000
border-left-size = 5
border-right-size = 5
border-top-size = 5

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

padding-left = 0
padding-right = 1

; Keep the right side evenly spaced.
module-margin = 1

separator =
separator-foreground = ${colors.disabled}

font-0 = "JetBrains Mono:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=10;2"

fixed-center = true

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio memory cpu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3
override-redirect = false

[module/xworkspaces]
type = internal/xworkspaces

enable-click = true
enable-scroll = false

; Pull the workspace row slightly left so the first pill sits closer to the bar edge.
; This is the one line you are most likely to tweak later: -1px or -2px.
format-offset = -2px

label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = #0E2229
label-active-padding = 1
label-active-margin = 1px

label-occupied = %name%
label-occupied-background = ${colors.background-alt}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-occupied-margin = 1px

label-empty = %name%
label-empty-background = ${colors.background-alt}
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1
label-empty-margin = 1px

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 1
label-urgent-margin = 1px

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

format = <label>
format-background = ${colors.primary}
format-foreground = #0E2229
format-padding = 2

label = %date%

[module/pulseaudio]
type = internal/pulseaudio

; Same spacing rules as the other right-side modules.
format-padding = 1

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2

; Same spacing rules as the other right-side modules.
format-padding = 1

format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2

; Same spacing rules as the other right-side modules.
format-padding = 0.5

format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
