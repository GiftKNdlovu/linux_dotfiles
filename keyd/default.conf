[ids]
# The asterisk means apply this rule to ALL connected keyboards automatically
*

[main]
# Maps Caps Lock to the "nav" layer when HELD.
# if you tap  quickly, it sends the standard 'escape' key (perfect for Vim!).
capslock = overload(nav, escape)
[main]
# Your snippet: Left Alt now acts as Control
leftalt = layer(control)

# The addition: Left Control now acts as Alt
leftcontrol = layer(alt)

[nav]
# Vim-style directional navigation
h = left
j = down
k = up
l = right

# Jump word by word (like Ctrl + Left/Right)
w = C-left
b = C-right

# Backspace an entire word
e = C-backspace


# Extra productivity keys for staying completely off the mouse
y = home
o = end
u = pageup
d = pagedown

# Maps 'capslock + i' to act as backspace
i = backspace
